<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 酒店在线预订平台</title>
    <!-- 引入 Google Fonts & Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 0;
        }

        /* 装饰背景圆球 */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .orb-1 {
            background: #4f46e5;
            top: -10%;
            left: -10%;
        }
        .orb-2 {
            background: #c084fc;
            bottom: -10%;
            right: -10%;
        }

        .register-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .brand-title {
            font-weight: 800;
            background: var(--accent-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .brand-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #f8fafc;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.25);
            color: #f8fafc;
        }

        .btn-submit {
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(168, 85, 247, 0.5);
            opacity: 0.95;
        }

        .alert-custom {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .card-footer-text {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            text-align: center;
        }

        .card-footer-text a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .card-footer-text a:hover {
            color: #c084fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- 装饰球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="register-card">
        <div class="brand-title">加入 Luxe Stay</div>
        <div class="brand-subtitle">创建你的账户，开启奢华旅程</div>

        <!-- 错误提示 -->
        <div id="errorMessage" th:if="${error}" class="alert-custom" th:text="${error}">
            用户名已存在
        </div>
        <div id="jsError" class="alert-custom" style="display: none;"></div>

        <form th:action="@{/register}" method="POST" onsubmit="return validateForm()">
            <div class="mb-3">
                <label for="username" class="form-label">用户名 (Username)</label>
                <input type="text" class="form-control" id="username" name="username" th:value="${user != null ? user.username : ''}" placeholder="用于登录的账号 (英文字母/数字)" required autocomplete="off">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="realName" class="form-label">真实姓名 (Real Name)</label>
                    <input type="text" class="form-control" id="realName" name="realName" th:value="${user != null ? user.realName : ''}" placeholder="姓名" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">联系电话 (Phone)</label>
                    <input type="tel" class="form-control" id="phone" name="phone" th:value="${user != null ? user.phone : ''}" placeholder="手机号" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">设置密码 (Password)</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="建议包含字母与数字" required>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">确认密码 (Confirm Password)</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-submit">注册账户</button>
        </form>

        <div class="card-footer-text">
            已有账号？ <a th:href="@{/login}">返回登录页面</a>
        </div>
    </div>

    <script>
        function validateForm() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirmPassword").value;
            var jsError = document.getElementById("jsError");

            if (password !== confirmPassword) {
                jsError.innerText = "两次输入的密码不一致，请重新检查！";
                jsError.style.display = "block";
                
                // 隐藏可能存在的服务器端错误提示
                var serverError = document.getElementById("errorMessage");
                if (serverError) {
                    serverError.style.display = "none";
                }
                
                return false;
            }
            return true;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
