<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的评价 - Luxe Stay 酒店预订平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%; filter: blur(100px);
            z-index: -1; opacity: 0.3;
        }
        .orb-1 { background: #4f46e5; top: -5%; left: -5%; }
        .orb-2 { background: #c084fc; bottom: -5%; right: -5%; }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #f8fafc !important;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-book-room {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-book-room:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
        }

        .btn-custom-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #f8fafc;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: transparent;
            cursor: pointer;
        }

        .btn-custom-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .review-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem 0;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .star-filled {
            color: #fbbf24;
        }

        .star-empty {
            color: #475569;
        }

        .review-label {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .alert-success-custom {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/profile">Luxe Stay</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" href="/rooms">浏览房型</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" href="/orders">我的订单</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom active" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a th:if="${currentUser.role == 'ADMIN'}" th:href="@{/admin/dashboard}" class="btn btn-sm btn-custom-outline me-2" style="border-color:rgba(168,85,247,0.4); color:#c4b5fd;">
                            <i class="bi bi-speedometer2"></i> 后台
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-custom-outline" href="/logout" style="border-color: rgba(239,68,68,0.4); color: #fca5a5;">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; margin-bottom: 3rem;">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0" style="color: #e2e8f0;">
                            <i class="bi bi-chat-square-text"></i> 我的评价
                        </h4>
                        <a href="/orders" class="btn-book-room">返回订单</a>
                    </div>

                    <div th:if="${success}" class="alert-success-custom mb-3" th:text="${success}"></div>
                    <div th:if="${error}" class="alert-custom mb-3" th:text="${error}"></div>

                    <!-- 空状态 -->
                    <div th:if="${reviews == null || reviews.empty}" class="text-center py-5">
                        <i class="bi bi-star" style="font-size: 3rem; color: rgba(255,255,255,0.1);"></i>
                        <p class="mt-3 mb-0" style="color: #94a3b8; font-size: 1.1rem;">暂无评价记录</p>
                    </div>

                    <!-- 评价列表 -->
                    <div th:each="review : ${reviews}" class="review-item">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div class="review-label">房型</div>
                                <span style="color: #cbd5e1; font-weight: 600;" th:text="${review.roomType.name}">标准双人间</span>
                            </div>
                            <div>
                                <div class="review-label text-end">评分</div>
                                <span th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:classappend="${i <= review.rating} ? 'bi-star-fill star-filled' : 'bi-star star-empty'" class="bi" style="font-size: 0.9rem;"></i>
                                </span>
                            </div>
                        </div>
                        <p th:if="${review.comment != null && !review.comment.isEmpty()}"
                           style="color: #94a3b8; margin-bottom: 0.5rem; font-style: italic;" th:text="'&quot;' + ${review.comment} + '&quot;'"></p>
                        <div style="color: #64748b; font-size: 0.75rem;">
                            <i class="bi bi-clock"></i>
                            <span th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-14 14:30</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
