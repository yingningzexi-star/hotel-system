<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 酒店在线预订平台</title>
    <!-- 引入 Google Fonts & Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 装饰背景圆球 */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .orb-1 {
            background: #4f46e5;
            top: -10%;
            left: -10%;
        }
        .orb-2 {
            background: #c084fc;
            bottom: -10%;
            right: -10%;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .brand-title {
            font-weight: 800;
            background: var(--accent-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .brand-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #f8fafc;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.25);
            color: #f8fafc;
        }

        .btn-submit {
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(168, 85, 247, 0.5);
            opacity: 0.95;
        }

        .alert-custom {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .alert-success-custom {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .card-footer-text {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            text-align: center;
        }

        .card-footer-text a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .card-footer-text a:hover {
            color: #c084fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- 装饰球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="brand-title">Luxe Stay</div>
        <div class="brand-subtitle">高端酒店在线预订服务平台</div>

        <!-- 注册成功提示 -->
        <div th:if="${param.registered}" class="alert-success-custom">
            账号注册成功！请使用注册的账户登录。
        </div>

        <!-- 错误提示 -->
        <div th:if="${error}" class="alert-custom" th:text="${error}">
            用户名或密码错误
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">用户名 (Username)</label>
                <input type="text" class="form-control" id="username" name="username" th:value="${username}" placeholder="请输入用户名" required autocomplete="off">
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">密码 (Password)</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-submit">登录系统</button>
        </form>

        <div class="card-footer-text">
            还没有账号？ <a th:href="@{/register}">立即注册新账号</a>
        </div>
    </div>

    <!-- 引入 Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
