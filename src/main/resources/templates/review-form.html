<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写评价 - Luxe Stay 酒店预订平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%; filter: blur(100px);
            z-index: -1; opacity: 0.3;
        }
        .orb-1 { background: #4f46e5; top: -5%; left: -5%; }
        .orb-2 { background: #c084fc; bottom: -5%; right: -5%; }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #f8fafc !important;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-book-room {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }

        .btn-book-room:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
        }

        .btn-custom-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #f8fafc;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: transparent;
            cursor: pointer;
        }

        .btn-custom-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .alert-custom {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }

        .order-summary {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .summary-label {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .summary-value {
            color: #cbd5e1;
            font-weight: 500;
        }

        .info-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.8rem 0;
        }
        .info-row:last-child {
            border-bottom: none;
        }

        label {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        textarea.form-control, input.form-control {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #f8fafc !important;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }

        textarea.form-control:focus, input.form-control:focus {
            border-color: #a855f7 !important;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2) !important;
        }

        textarea.form-control::placeholder {
            color: #64748b;
        }

        .star-rating {
            direction: rtl;
            display: inline-flex;
            font-size: 2rem;
            gap: 0.3rem;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            color: #475569;
            cursor: pointer;
            transition: color 0.15s ease, transform 0.15s ease;
        }

        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #fbbf24;
        }

        .star-rating label:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/profile">Luxe Stay</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" href="/rooms">浏览房型</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" href="/orders">我的订单</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link nav-link-custom" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a th:if="${currentUser.role == 'ADMIN'}" th:href="@{/admin/dashboard}" class="btn btn-sm btn-custom-outline me-2" style="border-color:rgba(168,85,247,0.4); color:#c4b5fd;">
                            <i class="bi bi-speedometer2"></i> 后台
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-custom-outline" href="/logout" style="border-color: rgba(239,68,68,0.4); color: #fca5a5;">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 3rem; margin-bottom: 3rem;">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card">
                    <h4 class="fw-bold mb-4" style="color: #e2e8f0;">
                        <i class="bi bi-star-fill" style="color: #fbbf24;"></i> 写评价
                    </h4>

                    <div th:if="${error}" class="alert-custom mb-3" th:text="${error}"></div>

                    <!-- 订单摘要 -->
                    <div class="order-summary mb-4">
                        <h6 class="fw-bold mb-3" style="color: #cbd5e1;">订单信息</h6>
                        <div class="row info-row">
                            <div class="col-5 summary-label">订单编号</div>
                            <div class="col-7 summary-value" style="font-family: monospace; font-size: 0.8rem;" th:text="${order.orderNo}">ORD202607131430001234</div>
                        </div>
                        <div class="row info-row">
                            <div class="col-5 summary-label">房型</div>
                            <div class="col-7 summary-value fw-bold" th:text="${order.roomType.name}">标准双人间</div>
                        </div>
                        <div class="row info-row">
                            <div class="col-5 summary-label">入住日期</div>
                            <div class="col-7 summary-value" th:text="${order.checkInDate}">2026-07-14</div>
                        </div>
                        <div class="row info-row">
                            <div class="col-5 summary-label">离店日期</div>
                            <div class="col-7 summary-value" th:text="${order.checkOutDate}">2026-07-16</div>
                        </div>
                        <div class="row info-row">
                            <div class="col-5 summary-label">总金额</div>
                            <div class="col-7 summary-value">
                                <span style="color: #a855f7; font-weight: 700;" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">398.00</span>
                                <span style="color: #94a3b8;"> 元</span>
                            </div>
                        </div>
                    </div>

                    <!-- 评价表单 -->
                    <form th:action="@{/reviews}" method="POST">
                        <input type="hidden" name="orderId" th:value="${order.id}">
                        <input type="hidden" name="roomTypeId" th:value="${order.roomType.id}">

                        <div class="mb-4">
                            <label class="mb-2">评分</label>
                            <div class="star-rating">
                                <input type="radio" id="star5" name="rating" value="5">
                                <label for="star5" title="5 星"><i class="bi bi-star-fill"></i></label>
                                <input type="radio" id="star4" name="rating" value="4">
                                <label for="star4" title="4 星"><i class="bi bi-star-fill"></i></label>
                                <input type="radio" id="star3" name="rating" value="3">
                                <label for="star3" title="3 星"><i class="bi bi-star-fill"></i></label>
                                <input type="radio" id="star2" name="rating" value="2">
                                <label for="star2" title="2 星"><i class="bi bi-star-fill"></i></label>
                                <input type="radio" id="star1" name="rating" value="1" checked>
                                <label for="star1" title="1 星"><i class="bi bi-star-fill"></i></label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="mb-2" for="comment">评论（选填）</label>
                            <textarea class="form-control" id="comment" name="comment" rows="4"
                                      placeholder="分享您的入住体验…（最多 500 字）" maxlength="500"></textarea>
                        </div>

                        <div class="d-flex gap-3">
                            <a th:href="@{/orders}" class="btn-custom-outline">取消</a>
                            <button type="submit" class="btn-book-room flex-grow-1">
                                <i class="bi bi-send"></i> 提交评价
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
