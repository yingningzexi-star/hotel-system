<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览房型 - Luxe Stay 酒店预订平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%; filter: blur(100px);
            z-index: -1; opacity: 0.3;
        }
        .orb-1 { background: #4f46e5; top: -5%; left: -5%; }
        .orb-2 { background: #c084fc; bottom: -5%; right: -5%; }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar-brand {
            font-weight: 800;
            background: var(--accent-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .search-card {
            margin: 2rem 0;
        }

        .room-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .room-card .price-tag {
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-card .price-unit {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #f8fafc;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.25);
            background: rgba(0, 0, 0, 0.3);
            color: #f8fafc;
        }

        .form-label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 18px rgba(168, 85, 247, 0.5);
        }

        .btn-book {
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-book:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
        }

        .btn-custom-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #f8fafc;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-custom-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .alert-custom {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }

        .alert-info-custom {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }

        .room-icon {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.3));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .badge-status {
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-weight: 600;
        }

        .badge-available {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .feature-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 0.25rem 0.75rem;
            font-size: 0.8rem;
            color: #94a3b8;
            margin: 0.15rem;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/profile">Luxe Stay</a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link" href="/rooms">浏览房型</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link" href="/orders">我的订单</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-custom-outline" href="/logout" style="border-color: rgba(239,68,68,0.4); color: #fca5a5;">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem; margin-bottom: 3rem;">
        <!-- 搜索区域 -->
        <div class="glass-card search-card">
            <h4 class="fw-bold mb-4" style="color: #e2e8f0;">搜索可预订房型</h4>
            <form th:action="@{/rooms}" method="GET" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">入住日期</label>
                    <input type="date" name="checkIn" class="form-control"
                           th:value="${checkIn}"
                           th:min="${today}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">离店日期</label>
                    <input type="date" name="checkOut" class="form-control"
                           th:value="${checkOut}"
                           th:min="${today}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">房间数量</label>
                    <input type="number" name="quantity" class="form-control"
                           th:value="${quantity}" min="1" max="5">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn-submit w-100">搜索房型</button>
                </div>
                <div class="col-md-2">
                    <a href="/rooms" class="btn-custom-outline w-100 text-center">清除筛选</a>
                </div>
            </form>
            <!-- 搜索提示 -->
            <div th:if="${error}" class="alert-custom mt-3" th:text="${error}"></div>
            <div th:if="${info}" class="alert-info-custom mt-3" th:text="${info}"></div>
        </div>

        <!-- 房型展示 -->
        <div class="row mt-4">
            <div class="col-12 mb-3" th:if="${checkIn != null && checkOut != null}">
                <p class="text-muted" style="color: #94a3b8 !important;">
                    筛选条件：<strong th:text="${checkIn}">2026-07-13</strong> 至 <strong th:text="${checkOut}">2026-07-15</strong>
                    （共 <strong th:text="${nights}">2</strong> 晚），
                    需要 <strong th:text="${quantity}">1</strong> 间房
                </p>
            </div>

            <div th:if="${rooms == null || rooms.empty}" class="col-12 text-center py-5">
                <div style="font-size: 4rem; opacity: 0.3;">&#127968;</div>
                <p class="mt-3" style="color: #94a3b8;">暂无可预订的房型</p>
            </div>

            <div class="col-lg-4 col-md-6 mb-4" th:each="room : ${rooms}">
                <div class="glass-card room-card">
                    <div class="room-icon">
                        <span th:if="${room.imagePath == null}">&#127968;</span>
                        <img th:if="${room.imagePath != null}" th:src="${room.imagePath}" alt="Room Image"
                             style="width:100%; height:100%; object-fit:cover; border-radius:16px;">
                    </div>
                    <h5 class="fw-bold mb-2" th:text="${room.name}">标准双人间</h5>
                    <p class="mb-3" style="color: #94a3b8; font-size: 0.9rem; min-height: 40px;"
                       th:text="${room.description}">舒适双人床</p>
                    <div class="mb-3">
                        <span class="feature-tag" th:text="'共 ' + ${room.totalQuantity} + ' 间'">共 10 间</span>
                    </div>
                    <div class="d-flex align-items-baseline mb-3">
                        <span class="price-tag" th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 2, 'POINT')}">199.00</span>
                        <span class="price-unit ms-1">元/晚</span>
                    </div>
                    <div class="mt-auto">
                        <form th:if="${checkIn != null && checkOut != null}" th:action="@{/booking}" method="POST">
                            <input type="hidden" name="roomTypeId" th:value="${room.id}">
                            <input type="hidden" name="checkIn" th:value="${checkIn}">
                            <input type="hidden" name="checkOut" th:value="${checkOut}">
                            <input type="hidden" name="quantity" th:value="${quantity}">
                            <button type="submit" class="btn btn-book">立即预订</button>
                        </form>
                        <div th:unless="${checkIn != null && checkOut != null}"
                             class="text-center py-2" style="color: #64748b; font-size: 0.85rem;">
                            请先选择入住日期搜索
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
