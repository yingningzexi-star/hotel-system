<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - Luxe Stay 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            position: relative;
            color-scheme: dark;
        }
        input, select, textarea { color-scheme: dark; }
        .table { --bs-table-bg: transparent; --bs-table-color: #e2e8f0; --bs-table-border-color: rgba(255,255,255,0.04); }
        .table thead th { background: rgba(15,23,42,0.95) !important; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: #f8fafc !important;
        }
        .orb {
            position: fixed; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(100px); z-index: -1; opacity: 0.25;
        }
        .orb-1 { background: #4f46e5; top: -10%; left: -10%; }
        .orb-2 { background: #c084fc; bottom: -10%; right: -10%; }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand {
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }
        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 10px;
            padding: 0.5rem 1rem !important;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #f8fafc !important;
            background: rgba(255,255,255,0.05);
        }
        .nav-link-custom i { margin-right: 6px; }

        .main-container { margin-top: 2rem; margin-bottom: 3rem; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .page-title {
            font-weight: 800;
            font-size: 1.8rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .table-custom {
            color: #e2e8f0;
            margin-bottom: 0;
        }
        .table-custom thead th {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.8rem 0.75rem;
        }
        .table-custom tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding: 0.75rem;
            vertical-align: middle;
        }

        .badge-role {
            padding: 0.3rem 0.7rem;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-user { background: rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#93c5fd; }
        .badge-admin { background: rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3); color:#fde047; }

        .status-normal { color: #4ade80; font-weight: 600; font-size: 0.85rem; }
        .status-banned { color: #f87171; font-weight: 600; font-size: 0.85rem; }

        .btn-glass {
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #cbd5e1;
            background: rgba(255,255,255,0.03);
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color:#f8fafc; }
        .btn-glass-danger { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
        .btn-glass-danger:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .btn-glass-success { border-color: rgba(34,197,94,0.4); color: #86efac; }
        .btn-glass-success:hover { background: rgba(34,197,94,0.15); color: #86efac; }

        .search-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            color: #f8fafc;
        }
        .search-box:focus {
            border-color: #a855f7;
            box-shadow: 0 0 8px rgba(168,85,247,0.2);
            outline: none;
        }
        .search-box::placeholder { color: #64748b; }

        .alert-glass {
            border-radius: 12px;
            padding: 0.6rem 1rem;
            border: 1px solid;
            margin-bottom: 1rem;
        }
        .alert-glass-success { background: rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.3); color:#86efac; }
        .alert-glass-danger { background: rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#fca5a5; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Luxe Stay · 管理后台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/rooms" target="_blank">
                            <i class="bi bi-house"></i>浏览房型
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/dashboard">
                            <i class="bi bi-speedometer2"></i>仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/room">
                            <i class="bi bi-building"></i>房型管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/orders">
                            <i class="bi bi-receipt"></i>订单管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/reviews">
                            <i class="bi bi-star"></i>评价管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom active" href="/admin/users">
                            <i class="bi bi-people"></i>用户管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item d-flex align-items-center">
                        <span class="text-light me-3" style="font-size:0.9rem;">
                            <i class="bi bi-shield-check me-1"></i>
                            <span th:text="${currentUser.realName}">管理员</span>
                        </span>
                        <a class="btn btn-sm btn-glass" href="/profile">
                            <i class="bi bi-person"></i> 个人中心
                        </a>
                        <a class="btn btn-sm btn-glass-danger ms-2" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> 退出
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <div class="page-title">用户管理</div>
                    <p class="text-secondary mt-1 mb-0" style="font-size:0.9rem; color:#94a3b8 !important;">
                        管理用户信息、封禁与解封
                    </p>
                </div>
            </div>

            <div th:if="${success}" class="alert-glass alert-glass-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert-glass alert-glass-danger" th:text="${error}"></div>

            <!-- 搜索 -->
            <form th:action="@{/admin/users}" method="GET" class="mb-4">
                <div class="row g-2">
                    <div class="col-md-8">
                        <input type="text" class="search-box w-100" name="keyword"
                               th:value="${keyword}" placeholder="搜索用户名或真实姓名...">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-glass w-100">搜索</button>
                    </div>
                    <div class="col-md-2">
                        <a href="/admin/users" class="btn btn-glass w-100">
                            <i class="bi bi-arrow-counterclockwise"></i> 重置
                        </a>
                    </div>
                </div>
            </form>

            <!-- 用户表格 -->
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>真实姓名</th>
                            <th>手机号</th>
                            <th>角色</th>
                            <th>取消次数</th>
                            <th>状态</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td style="color:#64748b;" th:text="${user.id}">1</td>
                            <td th:text="${user.username}">user1</td>
                            <td th:text="${user.realName}">张三</td>
                            <td th:text="${user.phone}">13800138000</td>
                            <td>
                                <span th:if="${user.role == 'ADMIN'}" class="badge-role badge-admin">管理员</span>
                                <span th:if="${user.role == 'USER'}" class="badge-role badge-user">用户</span>
                            </td>
                            <td th:text="${user.cancelCount}">0</td>
                            <td>
                                <span th:if="${user.bannedUntil == null}" class="status-normal">● 正常</span>
                                <span th:if="${user.bannedUntil != null}" class="status-banned">
                                    ● 封禁至 <span th:text="${#temporals.format(user.bannedUntil, 'MM-dd HH:mm')}">07-22 14:00</span>
                                </span>
                            </td>
                            <td style="font-size:0.8rem; color:#64748b;" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <form th:if="${user.bannedUntil == null && user.role != 'ADMIN'}"
                                      th:action="@{/admin/users/{id}/ban(id=${user.id})}" method="POST">
                                    <button class="btn btn-glass btn-glass-danger btn-sm">封禁</button>
                                </form>
                                <form th:if="${user.bannedUntil != null && user.role != 'ADMIN'}"
                                      th:action="@{/admin/users/{id}/unban(id=${user.id})}" method="POST">
                                    <button class="btn btn-glass btn-glass-success btn-sm">解封</button>
                                </form>
                                <span th:if="${user.role == 'ADMIN'}" style="color:#64748b; font-size:0.75rem;">-</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="9" class="text-center py-5" style="color:#64748b;">
                                <i class="bi bi-inbox" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                                暂无用户数据
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${totalPages > 1}" class="d-flex justify-content-center align-items-center mt-4 gap-2">
                <a th:if="${currentPage > 1}"
                   th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword})}"
                   class="btn btn-glass btn-sm"><i class="bi bi-chevron-left"></i> 上一页</a>
                <span th:if="${currentPage <= 1}" class="btn btn-glass btn-sm" style="opacity:0.3; pointer-events:none;"><i class="bi bi-chevron-left"></i> 上一页</span>

                <span style="color:#94a3b8; font-size:0.85rem;">
                    第 <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span> 页
                    <span style="color:#64748b;">(共 <span th:text="${totalItems}">0</span> 条)</span>
                </span>

                <a th:if="${currentPage < totalPages}"
                   th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword})}"
                   class="btn btn-glass btn-sm">下一页 <i class="bi bi-chevron-right"></i></a>
                <span th:if="${currentPage >= totalPages}" class="btn btn-glass btn-sm" style="opacity:0.3; pointer-events:none;">下一页 <i class="bi bi-chevron-right"></i></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
