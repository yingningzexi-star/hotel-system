<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - Luxe Stay 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            position: relative;
            color-scheme: dark;
        }
        input, select, textarea { color-scheme: dark; }
        .table { --bs-table-bg: transparent; --bs-table-color: #e2e8f0; --bs-table-border-color: rgba(255,255,255,0.04); }
        .table thead th { background: rgba(15,23,42,0.95) !important; }
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: #f8fafc !important;
        }
        .orb {
            position: fixed; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(100px); z-index: -1; opacity: 0.25;
        }
        .orb-1 { background: #4f46e5; top: -10%; left: -10%; }
        .orb-2 { background: #c084fc; bottom: -10%; right: -10%; }

        .navbar-custom {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand {
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }
        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 10px;
            padding: 0.5rem 1rem !important;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #f8fafc !important;
            background: rgba(255,255,255,0.05);
        }
        .nav-link-custom i { margin-right: 6px; }

        .main-container { margin-top: 2rem; margin-bottom: 3rem; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .page-title {
            font-weight: 800;
            font-size: 1.8rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .table-custom {
            color: #e2e8f0;
            margin-bottom: 0;
        }
        .table-custom thead th {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.8rem 0.5rem;
        }
        .table-custom tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding: 0.7rem 0.5rem;
            vertical-align: middle;
        }

        .badge-status {
            padding: 0.25rem 0.6rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge-booked { background: rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#93c5fd; }
        .badge-paid { background: rgba(6,182,212,0.15); border:1px solid rgba(6,182,212,0.3); color:#67e8f9; }
        .badge-checkin { background: rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:#86efac; }
        .badge-completed { background: rgba(168,85,247,0.15); border:1px solid rgba(168,85,247,0.3); color:#c4b5fd; }
        .badge-cancelled { background: rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }

        .btn-glass {
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #cbd5e1;
            background: rgba(255,255,255,0.03);
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color:#f8fafc; }
        .btn-glass-primary { background: linear-gradient(90deg, #6366f1, #a855f7); border: none; color: white; }
        .btn-glass-primary:hover { opacity: 0.9; color: white; }
        .btn-glass-success { border-color: rgba(34,197,94,0.4); color: #86efac; }
        .btn-glass-success:hover { background: rgba(34,197,94,0.15); color: #86efac; }
        .btn-glass-danger { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
        .btn-glass-danger:hover { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .btn-glass-warning { border-color: rgba(245,158,11,0.4); color: #fde047; }
        .btn-glass-warning:hover { background: rgba(245,158,11,0.15); color: #fde047; }

        .filter-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            color: #f8fafc;
            font-size: 0.85rem;
        }
        .filter-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 8px rgba(168,85,247,0.2);
            outline: none;
        }
        .filter-input::placeholder { color: #64748b; }
        select.filter-input { background-color: rgba(0,0,0,0.5); }

        .alert-glass {
            border-radius: 12px;
            padding: 0.6rem 1rem;
            border: 1px solid;
            margin-bottom: 1rem;
        }
        .alert-glass-success { background: rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.3); color:#86efac; }
        .alert-glass-danger { background: rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#fca5a5; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Luxe Stay · 管理后台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/rooms" target="_blank">
                            <i class="bi bi-house"></i>浏览房型
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/dashboard">
                            <i class="bi bi-speedometer2"></i>仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/room">
                            <i class="bi bi-building"></i>房型管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom active" href="/admin/orders">
                            <i class="bi bi-receipt"></i>订单管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/reviews">
                            <i class="bi bi-star"></i>评价管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="/admin/users">
                            <i class="bi bi-people"></i>用户管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item d-flex align-items-center">
                        <span class="text-light me-3" style="font-size:0.9rem;">
                            <i class="bi bi-shield-check me-1"></i>
                            <span th:text="${currentUser.realName}">管理员</span>
                        </span>
                        <a class="btn btn-sm btn-glass" href="/profile">
                            <i class="bi bi-person"></i> 个人中心
                        </a>
                        <a class="btn btn-sm btn-glass-danger ms-2" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> 退出
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <div class="page-title">订单管理</div>
                    <p class="text-secondary mt-1 mb-0" style="font-size:0.9rem; color:#94a3b8 !important;">
                        筛选、查看和管理所有订单
                    </p>
                </div>
            </div>

            <div th:if="${success}" class="alert-glass alert-glass-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert-glass alert-glass-danger" th:text="${error}"></div>

            <!-- 筛选 -->
            <form th:action="@{/admin/orders}" method="GET" class="mb-4">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2">
                        <label style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">状态</label>
                        <select class="filter-input w-100" name="status">
                            <option value="">全部</option>
                            <option value="BOOKED" th:selected="${filterStatus == 'BOOKED'}">已预订</option>
                            <option value="PAID" th:selected="${filterStatus == 'PAID'}">已支付</option>
                            <option value="CHECKED_IN" th:selected="${filterStatus == 'CHECKED_IN'}">已入住</option>
                            <option value="COMPLETED" th:selected="${filterStatus == 'COMPLETED'}">已完成</option>
                            <option value="CANCELLED" th:selected="${filterStatus == 'CANCELLED'}">已取消</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">开始日期</label>
                        <input type="date" class="filter-input w-100" name="startDate" th:value="${filterStartDate}">
                    </div>
                    <div class="col-md-2">
                        <label style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">结束日期</label>
                        <input type="date" class="filter-input w-100" name="endDate" th:value="${filterEndDate}">
                    </div>
                    <div class="col-md-3">
                        <label style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">用户名</label>
                        <input type="text" class="filter-input w-100" name="username" placeholder="搜索用户名..."
                               th:value="${filterUsername}">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-glass-primary me-1">
                            <i class="bi bi-search"></i> 筛选
                        </button>
                        <a href="/admin/orders" class="btn btn-glass">
                            <i class="bi bi-arrow-counterclockwise"></i> 重置
                        </a>
                    </div>
                </div>
            </form>

            <!-- 订单表格 -->
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>用户</th>
                            <th>房型</th>
                            <th>入住-离店</th>
                            <th>数量</th>
                            <th>金额</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td style="font-family:monospace; font-size:0.75rem; color:#64748b;" th:text="${order.orderNo}"></td>
                            <td th:text="${order.user.realName}">张三</td>
                            <td th:text="${order.roomType.name}">标准间</td>
                            <td style="font-size:0.82rem;">
                                <span th:text="${order.checkInDate}">07-15</span>
                                <span style="color:#64748b;">~</span>
                                <span th:text="${order.checkOutDate}">07-17</span>
                            </td>
                            <td th:text="${order.quantity}">1</td>
                            <td style="color:#a855f7; font-weight:600;" th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <span th:if="${order.status == 'BOOKED'}" class="badge-status badge-booked">已预订</span>
                                <span th:if="${order.status == 'PAID'}" class="badge-status badge-paid">已支付</span>
                                <span th:if="${order.status == 'CHECKED_IN'}" class="badge-status badge-checkin">已入住</span>
                                <span th:if="${order.status == 'COMPLETED'}" class="badge-status badge-completed">已完成</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="badge-status badge-cancelled">已取消</span>
                            </td>
                            <td style="font-size:0.78rem; color:#64748b;" th:text="${#temporals.format(order.createdAt, 'MM-dd HH:mm')}"></td>
                            <td>
                                <div class="d-flex gap-1">
                                    <form th:if="${order.status == 'PAID'}"
                                          th:action="@{/admin/orders/{id}/checkin(id=${order.id})}" method="POST">
                                        <button class="btn btn-glass btn-glass-success btn-sm">入住</button>
                                    </form>
                                    <form th:if="${order.status == 'CHECKED_IN'}"
                                          th:action="@{/admin/orders/{id}/checkout(id=${order.id})}" method="POST">
                                        <button class="btn btn-glass btn-glass-warning btn-sm">退房</button>
                                    </form>
                                    <form th:if="${order.status == 'BOOKED' || order.status == 'PAID'}"
                                          th:action="@{/admin/orders/{id}/cancel(id=${order.id})}" method="POST"
                                          onsubmit="return confirm('确定取消该订单吗？将释放已占用库存。')">
                                        <button class="btn btn-glass btn-glass-danger btn-sm">取消</button>
                                    </form>
                                    <span th:if="${order.status == 'COMPLETED' || order.status == 'CANCELLED'}"
                                          style="color:#64748b; font-size:0.7rem;">-</span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="9" class="text-center py-5" style="color:#64748b;">
                                <i class="bi bi-inbox" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                                暂无订单记录
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${totalPages > 1}" class="d-flex justify-content-center align-items-center mt-4 gap-2">
                <a th:if="${currentPage > 1}"
                   th:href="@{/admin/orders(page=${currentPage - 1}, status=${filterStatus}, startDate=${filterStartDate}, endDate=${filterEndDate}, username=${filterUsername})}"
                   class="btn btn-glass btn-sm"><i class="bi bi-chevron-left"></i> 上一页</a>
                <span th:if="${currentPage <= 1}" class="btn btn-glass btn-sm" style="opacity:0.3; pointer-events:none;"><i class="bi bi-chevron-left"></i> 上一页</span>

                <span style="color:#94a3b8; font-size:0.85rem;">
                    第 <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">1</span> 页
                    <span style="color:#64748b;">(共 <span th:text="${totalItems}">0</span> 条)</span>
                </span>

                <a th:if="${currentPage < totalPages}"
                   th:href="@{/admin/orders(page=${currentPage + 1}, status=${filterStatus}, startDate=${filterStartDate}, endDate=${filterEndDate}, username=${filterUsername})}"
                   class="btn btn-glass btn-sm">下一页 <i class="bi bi-chevron-right"></i></a>
                <span th:if="${currentPage >= totalPages}" class="btn btn-glass btn-sm" style="opacity:0.3; pointer-events:none;">下一页 <i class="bi bi-chevron-right"></i></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
