<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${detail.roomType.name} + ' - 房型详情'">房型详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(90deg, #6366f1, #a855f7);
            --font-family: 'Outfit', -apple-system, sans-serif;
        }
        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            position: relative;
        }
        .orb {
            position: fixed; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(100px); z-index: -1; opacity: 0.25;
        }
        .orb-1 { background: #4f46e5; top: -10%; left: -10%; }
        .orb-2 { background: #c084fc; bottom: -10%; right: -10%; }

        .navbar-custom {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand {
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }
        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #f8fafc !important;
        }

        .main-container { margin-top: 2rem; margin-bottom: 3rem; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .room-image-hero-container {
            width: 100%;
            height: 280px;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2));
        }
        .room-image-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }
        .room-thumb-img {
            height: 70px;
            width: 100%;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        .room-thumb-img:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .room-thumb-img.active {
            border-color: #a855f7;
            box-shadow: 0 0 8px rgba(168,85,247,0.4);
        }

        .room-name {
            font-weight: 800;
            font-size: 2rem;
        }
        .room-price {
            font-weight: 800;
            font-size: 2.2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .room-price-label { color: #64748b; font-size: 0.9rem; }
        .room-desc {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.7;
        }

        .info-label { color: #64748b; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { color: #e2e8f0; font-weight: 600; }

        .btn-glass {
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #cbd5e1;
            background: rgba(255,255,255,0.03);
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.08); color: #f8fafc; }
        .btn-book {
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.7rem 2rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }
        .btn-book:hover { transform: translateY(-2px); opacity: 0.9; color: white; }

        .inventory-item {
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .inventory-date { color: #94a3b8; font-size: 0.85rem; }
        .inventory-qty { font-weight: 700; }
        .qty-ok { color: #4ade80; }
        .qty-low { color: #fbbf24; }
        .qty-none { color: #f87171; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/rooms">Luxe Stay</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="userNav">
                <ul class="navbar-nav align-items-center" th:if="${currentUser != null}">
                    <li class="nav-item me-2">
                        <a class="nav-link nav-link-custom" href="/rooms">浏览房型</a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="nav-link nav-link-custom" href="/orders">我的订单</a>
                    </li>
                    <li class="nav-item me-2">
                        <a class="nav-link nav-link-custom" href="/profile">个人中心</a>
                    </li>
                    <li class="nav-item me-2">
                        <a th:if="${currentUser.role == 'ADMIN'}" th:href="@{/admin/dashboard}" class="btn btn-sm btn-glass" style="border-color:rgba(168,85,247,0.4); color:#c4b5fd;">
                            <i class="bi bi-speedometer2"></i> 后台
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-glass" href="/logout" style="border-color:rgba(239,68,68,0.4); color:#fca5a5;">退出登录</a>
                    </li>
                </ul>
                <ul class="navbar-nav align-items-center" th:if="${currentUser == null}">
                    <li class="nav-item">
                        <a class="btn btn-sm btn-glass me-2" href="/login">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-sm btn-glass" href="/register">注册</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container" th:with="room=${detail.roomType}">
        <div class="glass-card">
            <div class="row g-4">
                <!-- 左侧：图片 -->
                <div class="col-lg-5">
                    <div class="room-image-hero-container">
                        <img id="heroImage" th:src="${room.imagePath != null && !#strings.isEmpty(room.imagePath)} ? ${room.imagePath} : '/images/placeholder.svg'"
                             class="room-image-hero-img" alt="房型主图">
                    </div>
                    <!-- 缩略图展示多个照片 -->
                    <div th:if="${room.imagePath != null && !#strings.isEmpty(room.imagePath)}" class="row g-2 mt-2">
                        <div class="col-4">
                            <img th:src="${room.imagePath}" class="img-thumbnail room-thumb-img active" onclick="changeHero(this)">
                        </div>
                        <div class="col-4">
                            <img th:src="${#strings.replace(room.imagePath, '.jpg', '_1.jpg')}" class="img-thumbnail room-thumb-img" onclick="changeHero(this)">
                        </div>
                        <div class="col-4">
                            <img th:src="${#strings.replace(room.imagePath, '.jpg', '_2.jpg')}" class="img-thumbnail room-thumb-img" onclick="changeHero(this)">
                        </div>
                    </div>
                </div>
                <!-- 右侧：房型信息 -->
                <div class="col-lg-7">
                    <div class="room-name" th:text="${room.name}">标准双人间</div>
                    <div class="room-desc mt-2" th:text="${room.description}">描述信息</div>

                    <div class="row mt-4 g-3">
                        <div class="col-4">
                            <div class="info-label">单价</div>
                            <div class="room-price" th:text="'¥' + ${#numbers.formatDecimal(room.price, 1, 0)}">199</div>
                            <div class="room-price-label">元/晚</div>
                        </div>
                        <div class="col-4">
                            <div class="info-label">总房间数</div>
                            <div class="info-value" style="font-size:1.5rem;" th:text="${room.totalQuantity}">10</div>
                        </div>
                        <div class="col-4">
                            <div class="info-label">状态</div>
                            <div class="info-value">
                                <span th:if="${room.status == 1}" style="color:#86efac;">● 可预订</span>
                                <span th:if="${room.status == 0}" style="color:#fca5a5;">● 已下架</span>
                            </div>
                        </div>
                    </div>

                    <!-- 每日库存列表 -->
                    <div th:if="${detail.inventoryList != null}" class="mt-4">
                        <h6 class="fw-bold mb-3" style="color:#cbd5e1;">
                            <i class="bi bi-calendar-range me-1"></i>
                            入住期间每日可用库存
                            <span style="font-weight:400; color:#64748b; font-size:0.85rem;">
                                (共 <span th:text="${#lists.size(detail.inventoryList)}">0</span> 晚)
                            </span>
                        </h6>
                        <div class="d-flex flex-wrap gap-2">
                            <div th:each="inv : ${detail.inventoryList}" class="inventory-item d-flex align-items-center gap-3">
                                 <span class="inventory-date" th:text="${#temporals.format(inv.inventoryDate, 'MM/dd')}">07/13</span>
                                <span class="inventory-qty"
                                      th:classappend="${inv.availableQuantity == 0 ? 'qty-none' : (inv.availableQuantity le 3 ? 'qty-low' : 'qty-ok')}"
                                      th:text="${inv.availableQuantity + ' 间'}">10 间</span>
                            </div>
                        </div>
                    </div>

                    <!-- 总价 -->
                    <div th:if="${detail.totalPrice != null}" class="mt-4 p-3" style="background:rgba(0,0,0,0.2); border-radius:12px; border:1px solid var(--glass-border);">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span style="color:#94a3b8;">入住 <strong th:text="${detail.totalNights}">1</strong> 晚总价</span>
                            </div>
                            <div class="room-price" th:text="'¥' + ${#numbers.formatDecimal(detail.totalPrice, 1, 2)}">199.00</div>
                        </div>
                    </div>

                    <!-- 数量选择 + 预订按钮 -->
                    <div class="mt-4">
                        <form th:if="${currentUser != null && detail.roomType.status == 1}"
                              th:action="@{/booking}" method="POST">
                            <input type="hidden" name="roomTypeId" th:value="${detail.roomType.id}">
                            <input type="hidden" name="checkIn" th:value="${#temporals.format(checkInDate, 'yyyy-MM-dd')}">
                            <input type="hidden" name="checkOut" th:value="${#temporals.format(checkOutDate, 'yyyy-MM-dd')}">
                            <div class="row g-2 align-items-end">
                                <div class="col-md-3">
                                    <label class="info-label mb-1">预订数量</label>
                                    <input type="number" name="quantity" value="1" min="1" max="10"
                                           class="form-control" style="background:rgba(0,0,0,0.25); border:1px solid var(--glass-border); border-radius:12px; color:#f8fafc; padding:0.6rem 1rem;">
                                </div>
                                <div class="col-md-5">
                                    <button type="submit" class="btn btn-book w-100">
                                        <i class="bi bi-cart-check"></i> 立即预订
                                    </button>
                                </div>
                                <div class="col-md-4">
                                    <a th:href="@{/rooms}" class="btn btn-glass w-100 text-center">
                                        <i class="bi bi-arrow-left"></i> 继续浏览
                                    </a>
                                </div>
                            </div>
                        </form>
                        <div th:if="${currentUser == null}" class="d-flex gap-2">
                            <a th:href="@{/rooms}" class="btn btn-glass flex-fill text-center">
                                <i class="bi bi-arrow-left"></i> 继续浏览
                            </a>
                            <a th:href="@{/login}" class="btn btn-book flex-fill text-center">
                                <i class="bi bi-box-arrow-in-right"></i> 登录后预订
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 评价区域 -->
        <div class="glass-card mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0" style="color:#e2e8f0;">
                    <i class="bi bi-star-fill" style="color:#fbbf24;"></i> 住客评价
                </h5>
                <div>
                    <span style="color:#fbbf24; font-size:1.5rem; font-weight:800;" th:text="${#numbers.formatDecimal(avgRating, 1, 1)}">4.5</span>
                    <span style="color:#64748b;"> / 5</span>
                    <span style="color:#64748b; font-size:0.85rem;" class="ms-2">
                        (<span th:text="${reviewCount}">0</span> 条评价)
                    </span>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-4">
                <i class="bi bi-chat-square-text" style="font-size:2rem; color: rgba(255,255,255,0.08);"></i>
                <p class="mt-2" style="color:#64748b;">暂无评价，成为第一个评价的人吧！</p>
            </div>

            <div th:each="review : ${reviews}" style="border-bottom:1px solid rgba(255,255,255,0.04); padding:1rem 0;">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span style="color:#cbd5e1; font-weight:600;" th:text="${review.user.realName}">张三</span>
                        <span style="color:#fbbf24; margin-left:0.5rem;">
                            <i th:each="i : ${#numbers.sequence(1, 5)}"
                               th:class="${i <= review.rating} ? 'bi bi-star-fill' : 'bi bi-star'"
                               style="font-size:0.8rem;" class="bi"></i>
                        </span>
                    </div>
                    <span style="color:#64748b; font-size:0.75rem;" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">2026-07-14</span>
                </div>
                <p th:if="${review.comment != null && !review.comment.isEmpty()}"
                   style="color:#94a3b8; margin-top:0.5rem; margin-bottom:0;" th:text="${review.comment}"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function changeHero(element) {
            document.getElementById('heroImage').src = element.src;
            document.querySelectorAll('.room-thumb-img').forEach(function(img) {
                img.classList.remove('active');
            });
            element.classList.add('active');
        }
    </script>
</body>
</html>
