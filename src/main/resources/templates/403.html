<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 拒绝访问</title>
    <!-- 引入 Google Fonts & Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: linear-gradient(90deg, #ef4444, #f43f5e);
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 装饰背景圆球 */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
        }
        .orb-1 {
            background: #ef4444;
            top: -10%;
            left: -10%;
        }
        .orb-2 {
            background: #f43f5e;
            bottom: -10%;
            right: -10%;
        }

        .error-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .error-code {
            font-weight: 800;
            background: var(--accent-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .error-title {
            font-weight: 700;
            color: #f1f5f9;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .error-description {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 18px rgba(168, 85, 247, 0.5);
            color: white;
        }
    </style>
</head>
<body>

    <!-- 装饰球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="error-card">
        <div class="error-code">403</div>
        <div class="error-title">越权访问已拦截</div>
        <div class="error-description">
            非常抱歉，你当前使用的账号没有访问该管理后台页面的权限。<br>
            为了保障系统安全，我们拦截了本次请求。
        </div>

        <a th:href="@{/profile}" class="btn-home">返回个人中心</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
